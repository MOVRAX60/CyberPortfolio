    Content: >
        Infrastructure engineer turned security professional. Seven years building and hardening enterprise systems before going deep on the defensive and offensive sides of security. 
        Now focused on incident response, digital forensics, and penetration testing — with a background that covers everything from Active Directory architecture to NIST control implementation to network forensics.